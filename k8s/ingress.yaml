apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skincare-ingress
  namespace: skincare
spec:
  rules:
    - host: skincare.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000