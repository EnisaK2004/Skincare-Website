version: '3.8'
services:
  frontend:
    build: .
    ports:
      - '8080:80'
    depends_on:
      - backend

  backend:
    build: ./src/backend
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=Enisa123!
      - DB_NAME=glowcare
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Enisa123!
      POSTGRES_DB: glowcare
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  pgdata: